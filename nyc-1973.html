<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Election of 1973</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: auto;
      padding: 20px;
      background: #f4f4f4;
    }
    .candidate {
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      color: white;
    }
    .candidate img {
      width: 80px;
      height: 80px;
      border-radius: 8px;
      margin-right: 15px;
      object-fit: cover;
      flex-shrink: 0;
      border: 2px solid white;
    }
    .candidate-details {
      flex-grow: 1;
    }
    button {
      padding: 10px 15px;
      margin-top: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
    /* Different background colors per candidate */
    .beame { background-color: #3333ff; }        /* Crimson Red */
    .marchi { background-color: #e81b23; }       /* Dodger Blue */
    .blumenthal { background-color: #cc0000; }       /* Dodger Blue */
    .biaggi { background-color: #ff8c00; }       /* Dodger Blue */
     </style>
</head>
<body>
  <h1>NYC Mayoral Election Simulator</h1>
  <h2>Election of 1973</h2>

  <div class="candidate beame">
    <img src="abraham_beame.jpg" alt="Abraham Beame" />
    <div class="candidate-details blue">
      <h3>Abraham Beame</h3>
      <p><strong>Party:</strong> Democrat</p>
      <p><strong>Bio:</strong> SOON</p>
      <button onclick="vote('Abraham Beame')">Vote for Abraham Beame</button>
    </div>
  </div>

  <div class="candidate marchi">
    <img src="john_j_marchi.jpg" alt="John J. Marchi" />
    <div class="candidate-details red">
      <h3>John J. Marchi</h3>
      <p><strong>Party:</strong> Republican</p>
      <p><strong>Bio:</strong> SOON</p>
      <button onclick="vote('John J. Marchi')">Vote for John J. Marchi</button>
    </div>
  </div>

  <div class="candidate blumenthal">
    <img src="albert_h_blumenthal.jpg" alt="Albert H. Blumenthal" />
    <div class="candidate-details red">
      <h3>Albert H. Blumenthal</h3>
      <p><strong>Party:</strong> Liberal</p>
      <p><strong>Bio:</strong> SOON</p>
      <button onclick="vote('Albert H. Blumenthal')">Vote for Albert H. Blumenthal</button>
    </div>
  </div>

  <div class="candidate biaggi">
    <img src="mario_biaggi.jpg" alt="Mario Biaggi" />
    <div class="candidate-details red">
      <h3>Mario Biaggi</h3>
      <p><strong>Party:</strong> Conservative</p>
      <p><strong>Bio:</strong> SOON</p>
      <button onclick="vote('Mario Biaggi')">Vote for Mario Biaggi</button>
    </div>
  </div>

  <script>
    function vote(candidate) {
      localStorage.setItem('nyc_1973', candidate);
      window.location.href = 'nyc-1977.html'; // Redirect to next election page
    }
  </script>
</body>
</html>
