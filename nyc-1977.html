<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Election of 1977</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: auto;
      padding: 20px;
      background: #f4f4f4;
    }
    .candidate {
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      color: white;
    }
    .candidate img {
      width: 80px;
      height: 80px;
      border-radius: 8px;
      margin-right: 15px;
      object-fit: cover;
      flex-shrink: 0;
      border: 2px solid white;
    }
    .candidate-details {
      flex-grow: 1;
    }
    button {
      padding: 10px 15px;
      margin-top: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
    /* Different background colors per candidate */
    .koch { background-color: #3333ff; }        /* Crimson Red */
    .cuomo { background-color: #cc0000; }       /* Dodger Blue */
     </style>
</head>
<body>
  <h1>NYC Mayoral Election Simulator</h1>
  <h2>Election of 1977</h2>

  <div class="candidate koch">
    <img src="ed_koch.jpg" alt="Ed Koch" />
    <div class="candidate-details blue">
      <h3>Ed Koch</h3>
      <p><strong>Party:</strong> Democrat</p>
      <p><strong>Bio:</strong> SOON</p>
      <button onclick="vote('Ed Koch')">Vote for Ed Koch</button>
    </div>
  </div>

  <div class="candidate cuomo">
    <img src="mario_cuomo.jpg" alt="Mario Cuomo" />
    <div class="candidate-details red">
      <h3>Mario Cuomo</h3>
      <p><strong>Party:</strong> Liberal</p>
      <p><strong>Bio:</strong> SOON</p>
      <button onclick="vote('Mario Cuomo')">Vote for Mario Cuomo</button>
    </div>
  </div>

  <script>
    function vote(candidate) {
      localStorage.setItem('nyc_1977', candidate);
      window.location.href = 'nyc-1981.html'; // Redirect to next election page
    }
  </script>
</body>
</html>
