<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Election of 2013</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: auto;
      padding: 20px;
      background: #f4f4f4;
    }
    .candidate {
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      color: white;
    }
    .candidate img {
      width: 80px;
      height: 80px;
      border-radius: 8px;
      margin-right: 15px;
      object-fit: cover;
      flex-shrink: 0;
      border: 2px solid white;
    }
    .candidate-details {
      flex-grow: 1;
    }
    button {
      padding: 10px 15px;
      margin-top: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
    /* Different background colors per candidate */
    .de_blasio { background-color: #3333ff; }       /* Dodger Blue */
    .lhota { background-color: #e81b23; }        /* Crimson Red */
     </style>
</head>
<body>
  <h1>NYC Mayoral Election Simulator</h1>
  <h2>Election of 2013</h2>

  <div class="candidate de_blasio">
    <img src="bill_de_blasio.jpg" alt="Bill de Blasio" />
    <div class="candidate-details red">
      <h3>Bill de Blasio</h3>
      <p><strong>Party:</strong> Democrat</p>
      <p><strong>Bio:</strong> Campaigning on economic equality, universal pre-kindergarten programs, and police reform.</p>
      <button onclick="vote('Bill de Blasio')">Vote for Bill de Blasio</button>
    </div>
  </div>

  <div class="candidate lhota">
    <img src="joe_lhota.jpg" alt="Joe Lhota" />
    <div class="candidate-details blue">
      <h3>Joe Lhota</h3>
      <p><strong>Party:</strong> Republican</p>
      <p><strong>Bio:</strong> Focused on job creation, tax cuts, and education improvement.</p>
      <button onclick="vote('Joe Lhota')">Vote for Joe Lhota</button>
    </div>
  </div>

  <script>
    function vote(candidate) {
      localStorage.setItem('nyc_2013', candidate);
      window.location.href = 'nyc-2017.html'; // Redirect to next election page
    }
  </script>
</body>
</html>
