<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Election of 1921</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: auto;
      padding: 20px;
      background: #f4f4f4;
    }
    .candidate {
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      color: white;
    }
    .candidate img {
      width: 80px;
      height: 80px;
      border-radius: 8px;
      margin-right: 15px;
      object-fit: cover;
      flex-shrink: 0;
      border: 2px solid white;
    }
    .candidate-details {
      flex-grow: 1;
    }
    button {
      padding: 10px 15px;
      margin-top: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
    /* Different background colors per candidate */
    .hylan { background-color: #3333ff; }        /* Crimson Red */
    .curran { background-color: #e81b23; }       /* Dodger Blue */
    .panken { background-color: #cd3700; }       /* Dodger Blue */
     </style>
</head>
<body>
  <h1>NYC Mayoral Election Simulator</h1>
  <h2>Election of 1921</h2>

  <div class="candidate hylan">
    <img src="john_f_hylan.jpg" alt="John F. Hylan" />
    <div class="candidate-details blue">
      <h3>John F. Hylan</h3>
      <p><strong>Party:</strong> Democrat</p>
      <p><strong>Bio:</strong> SOON</p>
      <button onclick="vote('John F. Hylan')">Vote for John F. Hylan</button>
    </div>
  </div>

  <div class="candidate curran">
    <img src="henry_h_curran.jpg" alt="Henry H. Curran" />
    <div class="candidate-details red">
      <h3>Henry H. Curran</h3>
      <p><strong>Party:</strong> Republican</p>
      <p><strong>Bio:</strong> SOON</p>
      <button onclick="vote('Henry H. Curran')">Vote for Henry H. Curran</button>
    </div>
  </div>

  <div class="candidate panken">
    <img src="jacob_panken.jpg" alt="Jacob Panken" />
    <div class="candidate-details red">
      <h3>Jacob Panken</h3>
      <p><strong>Party:</strong> Socialist</p>
      <p><strong>Bio:</strong> SOON</p>
      <button onclick="vote('Jacob Panken')">Vote for Jacob Panken</button>
    </div>
  </div>

  <script>
    function vote(candidate) {
      localStorage.setItem('nyc_1921', candidate);
      window.location.href = 'nyc-1925.html'; // Redirect to next election page
    }
  </script>
</body>
</html>
