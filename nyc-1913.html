<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Election of 1913</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: auto;
      padding: 20px;
      background: #f4f4f4;
    }
    .candidate {
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      color: white;
    }
    .candidate img {
      width: 80px;
      height: 80px;
      border-radius: 8px;
      margin-right: 15px;
      object-fit: cover;
      flex-shrink: 0;
      border: 2px solid white;
    }
    .candidate-details {
      flex-grow: 1;
    }
    button {
      padding: 10px 15px;
      margin-top: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
    /* Different background colors per candidate */
    .mitchel { background-color: #79cdcd; }        /* Crimson Red */
    .mccall { background-color: #3333ff; }       /* Dodger Blue */
    .russell { background-color: #cd3700; }       /* Dodger Blue */
     </style>
</head>
<body>
  <h1>NYC Mayoral Election Simulator</h1>
  <h2>Election of 1913</h2>

  <div class="candidate mitchel">
    <img src="john_p_mitchel.jpg" alt="John P. Mitchel" />
    <div class="candidate-details blue">
      <h3>John P. Mitchel</h3>
      <p><strong>Party:</strong> Fusion</p>
      <p><strong>Bio:</strong> SOON</p>
      <button onclick="vote('John P. Mitchel')">Vote for John P. Mitchel</button>
    </div>
  </div>

  <div class="candidate mccall">
    <img src="edward_e_mccall.jpg" alt="Edward E. McCall" />
    <div class="candidate-details red">
      <h3>Edward E. McCall</h3>
      <p><strong>Party:</strong> Democrat</p>
      <p><strong>Bio:</strong> SOON</p>
      <button onclick="vote('Edward E. McCall')">Vote for Edward E. McCall</button>
    </div>
  </div>

  <div class="candidate russell">
    <img src="charles_edward_russell.jpg" alt="Charles Edward Russell" />
    <div class="candidate-details red">
      <h3>Charles Edward Russell</h3>
      <p><strong>Party:</strong> Socialist</p>
      <p><strong>Bio:</strong> SOON</p>
      <button onclick="vote('Charles Edward Russell')">Vote for Charles Edward Russell</button>
    </div>
  </div>

  <script>
    function vote(candidate) {
      localStorage.setItem('nyc_1913', candidate);
      window.location.href = 'nyc-1917.html'; // Redirect to next election page
    }
  </script>
</body>
</html>
