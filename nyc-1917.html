<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Election of 1917</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: auto;
      padding: 20px;
      background: #f4f4f4;
    }
    .candidate {
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      color: white;
    }
    .candidate img {
      width: 80px;
      height: 80px;
      border-radius: 8px;
      margin-right: 15px;
      object-fit: cover;
      flex-shrink: 0;
      border: 2px solid white;
    }
    .candidate-details {
      flex-grow: 1;
    }
    button {
      padding: 10px 15px;
      margin-top: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
    /* Different background colors per candidate */
    .hylan { background-color: #3333ff; }        /* Crimson Red */
    .mitchel { background-color: #79cdcd; }       /* Dodger Blue */
    .hillquit { background-color: #cd3700; }       /* Dodger Blue */
    .bennett { background-color: #e81b23; }       /* Dodger Blue */
     </style>
</head>
<body>
  <h1>NYC Mayoral Election Simulator</h1>
  <h2>Election of 1917</h2>

  <div class="candidate hylan">
    <img src="john_f_hylan.jpg" alt="John F. Hylan" />
    <div class="candidate-details blue">
      <h3>John F. Hylan</h3>
      <p><strong>Party:</strong> Democrat</p>
      <p><strong>Bio:</strong> SOON</p>
      <button onclick="vote('John F. Hylan')">Vote for John F. Hylan</button>
    </div>
  </div>

  <div class="candidate mitchel">
    <img src="john_p_mitchel.jpg" alt="John P. Mitchel" />
    <div class="candidate-details red">
      <h3>John P. Mitchel</h3>
      <p><strong>Party:</strong> Fusion</p>
      <p><strong>Bio:</strong> SOON</p>
      <button onclick="vote('John P. Mitchel')">Vote for John P. Mitchel</button>
    </div>
  </div>

  <div class="candidate hillquit">
    <img src="morris_hillquit.jpg" alt="Morris Hillquit" />
    <div class="candidate-details red">
      <h3>Morris Hillquit</h3>
      <p><strong>Party:</strong> Socialist</p>
      <p><strong>Bio:</strong> SOON</p>
      <button onclick="vote('Morris Hillquit')">Vote for Morris Hillquit</button>
    </div>
  </div>

  <div class="candidate bennett">
    <img src="william_m_bennett.jpg" alt="William M. Bennett" />
    <div class="candidate-details red">
      <h3>William M. Bennett</h3>
      <p><strong>Party:</strong> Republican</p>
      <p><strong>Bio:</strong> SOON</p>
      <button onclick="vote('William M. Bennett')">Vote for William M. Bennett</button>
    </div>
  </div>

  <script>
    function vote(candidate) {
      localStorage.setItem('nyc_1917', candidate);
      window.location.href = 'nyc-1921.html'; // Redirect to next election page
    }
  </script>
</body>
</html>
