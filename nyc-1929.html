<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Election of 1929</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: auto;
      padding: 20px;
      background: #f4f4f4;
    }
    .candidate {
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      color: white;
    }
    .candidate img {
      width: 80px;
      height: 80px;
      border-radius: 8px;
      margin-right: 15px;
      object-fit: cover;
      flex-shrink: 0;
      border: 2px solid white;
    }
    .candidate-details {
      flex-grow: 1;
    }
    button {
      padding: 10px 15px;
      margin-top: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
    /* Different background colors per candidate */
    .walker { background-color: #3333ff; }        /* Crimson Red */
    .la_guardia { background-color: #e81b23; }       /* Dodger Blue */
    .thomas { background-color: #cd3700; }       /* Dodger Blue */
     </style>
</head>
<body>
  <h1>NYC Mayoral Election Simulator</h1>
  <h2>Election of 1929</h2>

  <div class="candidate walker">
    <img src="jimmy_walker.jpg" alt="Jimmy Walker" />
    <div class="candidate-details blue">
      <h3>Jimmy Walker</h3>
      <p><strong>Party:</strong> Democrat</p>
      <p><strong>Bio:</strong> SOON</p>
      <button onclick="vote('Jimmy Walker')">Vote for Jimmy Walker</button>
    </div>
  </div>

  <div class="candidate la_guardia">
    <img src="fiorello_la_guardia.jpg" alt="Fiorello H. La Guardia" />
    <div class="candidate-details red">
      <h3>Fiorello H. La Guardia</h3>
      <p><strong>Party:</strong> Republican</p>
      <p><strong>Bio:</strong> SOON</p>
      <button onclick="vote('Fiorello H. La Guardia')">Vote for Fiorello H. La Guardia</button>
    </div>
  </div>

  <div class="candidate thomas">
    <img src="norman_thomas.jpg" alt="Norman Thomas" />
    <div class="candidate-details red">
      <h3>Norman Thomas</h3>
      <p><strong>Party:</strong> Socialist</p>
      <p><strong>Bio:</strong> SOON</p>
      <button onclick="vote('Norman Thomas')">Vote for Norman Thomas</button>
    </div>
  </div>

  <script>
    function vote(candidate) {
      localStorage.setItem('nyc_1929', candidate);
      window.location.href = 'nyc-1932.html'; // Redirect to next election page
    }
  </script>
</body>
</html>
