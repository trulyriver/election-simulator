<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Election of 1937</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: auto;
      padding: 20px;
      background: #f4f4f4;
    }
    .candidate {
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      color: white;
    }
    .candidate img {
      width: 80px;
      height: 80px;
      border-radius: 8px;
      margin-right: 15px;
      object-fit: cover;
      flex-shrink: 0;
      border: 2px solid white;
    }
    .candidate-details {
      flex-grow: 1;
    }
    button {
      padding: 10px 15px;
      margin-top: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
    /* Different background colors per candidate */
    .la_guardia { background-color: #e81b23; }       /* Dodger Blue */
    .mahoney { background-color: #3333ff; }        /* Crimson Red */
     </style>
</head>
<body>
  <h1>NYC Mayoral Election Simulator</h1>
  <h2>Election of 1937</h2>

  <div class="candidate la_guardia">
    <img src="fiorello_la_guardia.jpg" alt="Fiorello La Guardia" />
    <div class="candidate-details red">
      <h3>Fiorello La Guardia</h3>
      <p><strong>Party:</strong> Republican</p>
      <p><strong>Bio:</strong> SOON</p>
      <button onclick="vote('Fiorello La Guardia')">Vote for Fiorello La Guardia</button>
    </div>
  </div>

  <div class="candidate mahoney">
    <img src="jeremiah_t_mahoney.jpg" alt="Jeremiah T. Mahoney" />
    <div class="candidate-details blue">
      <h3>Jeremiah T. Mahoney</h3>
      <p><strong>Party:</strong> Democrat</p>
      <p><strong>Bio:</strong> SOON</p>
      <button onclick="vote('Jeremiah T. Mahoney')">Vote for Jeremiah T. Mahoney</button>
    </div>
  </div>

  <script>
    function vote(candidate) {
      localStorage.setItem('nyc_1937', candidate);
      window.location.href = 'nyc-1941.html'; // Redirect to next election page
    }
  </script>
</body>
</html>
