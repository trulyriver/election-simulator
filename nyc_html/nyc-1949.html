<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Election of 1949</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: auto;
      padding: 20px;
      background: #f4f4f4;
    }
    .candidate {
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      color: white;
    }
    .candidate img {
      width: 80px;
      height: 80px;
      border-radius: 8px;
      margin-right: 15px;
      object-fit: cover;
      flex-shrink: 0;
      border: 2px solid white;
    }
    .candidate-details {
      flex-grow: 1;
    }
    button {
      padding: 10px 15px;
      margin-top: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
    /* Different background colors per candidate */
    .odwyer { background-color: #3333ff; }        /* Crimson Red */
    .morris { background-color: #e81b23; }       /* Dodger Blue */
    .marcantonio { background-color: #ff6347; }       /* Dodger Blue */
     </style>
</head>
<body>
  <h1>NYC Mayoral Election Simulator</h1>
  <h2>Election of 1949</h2>

  <div class="candidate odwyer">
    <img src="william_odwyer.jpg" alt="William O'Dwyer" />
    <div class="candidate-details blue">
      <h3>William O'Dwyer</h3>
      <p><strong>Party:</strong> Democrat</p>
      <p><strong>Bio:</strong> SOON</p>
      <button onclick="vote('William ODwyer')">Vote for William O'Dwyer</button>
    </div>
  </div>

  <div class="candidate morris">
    <img src="newbold_morris.jpg" alt="Newbold Morris" />
    <div class="candidate-details red">
      <h3>Newbold Morris</h3>
      <p><strong>Party:</strong> Republican</p>
      <p><strong>Bio:</strong> SOON</p>
      <button onclick="vote('Newbold Morris')">Vote for Newbold Morris</button>
    </div>
  </div>

  <div class="candidate marcantonio">
    <img src="vito_marcantonio.jpg" alt="Vito Marcantonio" />
    <div class="candidate-details red">
      <h3>Vito Marcantonio</h3>
      <p><strong>Party:</strong> American Labor</p>
      <p><strong>Bio:</strong> SOON</p>
      <button onclick="vote('Vito Marcantonio')">Vote for Vito Marcantonio</button>
    </div>
  </div>

  <script>
    function vote(candidate) {
      localStorage.setItem('nyc_1949', candidate);
      window.location.href = 'nyc-1950.html'; // Redirect to next election page
    }
  </script>
</body>
</html>
