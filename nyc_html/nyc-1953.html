<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Election of 1953</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: auto;
      padding: 20px;
      background: #f4f4f4;
    }
    .candidate {
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      color: white;
    }
    .candidate img {
      width: 80px;
      height: 80px;
      border-radius: 8px;
      margin-right: 15px;
      object-fit: cover;
      flex-shrink: 0;
      border: 2px solid white;
    }
    .candidate-details {
      flex-grow: 1;
    }
    button {
      padding: 10px 15px;
      margin-top: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
    /* Different background colors per candidate */
    .wagner_jr { background-color: #3333ff; }        /* Crimson Red */
    .riegelman { background-color: #e81b23; }       /* Dodger Blue */
    .halley { background-color: #cc0000; }       /* Dodger Blue */
     </style>
</head>
<body>
  <h1>NYC Mayoral Election Simulator</h1>
  <h2>Election of 1953</h2>

  <div class="candidate wagner_jr">
    <img src="robert_f_wagner_jr.jpg" alt="Robert F. Wagner Jr." />
    <div class="candidate-details blue">
      <h3>Robert F. Wagner Jr.</h3>
      <p><strong>Party:</strong> Democrat</p>
      <p><strong>Bio:</strong> SOON</p>
      <button onclick="vote('Robert F. Wagner Jr.')">Vote for Robert F. Wagner Jr.</button>
    </div>
  </div>

  <div class="candidate riegelman">
    <img src="harold_riegelman.jpg" alt="Harold Riegelman" />
    <div class="candidate-details red">
      <h3>Harold Riegelman</h3>
      <p><strong>Party:</strong> Republican</p>
      <p><strong>Bio:</strong> SOON</p>
      <button onclick="vote('Harold Riegelman')">Vote for Harold Riegelman</button>
    </div>
  </div>

  <div class="candidate halley">
    <img src="rudolph_halley.jpg" alt="Rudolph Halley" />
    <div class="candidate-details red">
      <h3>Rudolph Halley</h3>
      <p><strong>Party:</strong> Liberal</p>
      <p><strong>Bio:</strong> SOON</p>
      <button onclick="vote('Rudolph Halley')">Vote for Rudolph Halley</button>
    </div>
  </div>

  <script>
    function vote(candidate) {
      localStorage.setItem('nyc_1953', candidate);
      window.location.href = 'nyc-1957.html'; // Redirect to next election page
    }
  </script>
</body>
</html>
