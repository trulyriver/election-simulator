<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Election Simulator</title>

  <link rel="icon" type="image/png" href="favicon.png">

  <meta property="og:title" content="Election Simulator">
  <meta property="og:description" content="Vote in elections throughout American history!">
  <meta property="og:image" content="https://trulyriver.github.io/election-simulator/thumbnail.png">
  <meta property="og:url" content="https://trulyriver.github.io/election-simulator/">
  <meta property="og:type" content="website">

  <style>

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #4194cb;
      color: white;
    }

    .container {
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }

    h1, h2, p {
      text-align: center;
    }

    .button {
      display: block;
      margin: 30px auto;
      padding: 15px 25px;
      font-size: 16px;
      background-color: #3333ff;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s;
      width: 300px;
    }

    .button:hover {
      background-color: #1d1dff;
    }

    .background {
      background-size: cover;
      background-position: center;
      padding: 60px 20px;
      color: white;
      text-shadow: 1px 1px 2px #000;
    }

  </style>
</head>

<body>

  <!-- PAGE 1 -->

  <div class="container">

    <div class="background">

      <h1>Election Simulator</h1>

      <p>
        Travel through American history and cast your vote in elections across the United States.
        Explore presidential races, mayoral contests, gubernatorial elections, and more.
      </p>

      <button class="button" onclick="goToPresidential()">
        US Presidential Elections
      </button>

      <button class="button" onclick="goToNYC()">
        NYC Mayoral Elections
      </button>

      <button class="button" onclick="comingSoon()">
        Coming Soon
      </button>

      <button class="button" onclick="comingSoon()">
        Coming Soon
      </button>

      <img
        src="us_capitol.jpg"
        alt="U.S. Capitol"
        style="display: block; margin: 30px auto; max-width: 100%; border-radius: 8px;"
      >

    </div>

    <p style="text-align:center;">
      Created by trulyriver and trulyreservoir
    </p>

  </div>

  <script>

    function goToPresidential() {
      window.location.href = "vote.html";
    }

    function goToNYC() {
      window.location.href = "nyc-index.html";
    }

    function comingSoon() {
      alert("This election route is coming soon.");
    }

  </script>

</body>
</html>
